<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>macpulse</title>
<style>
  :root {
    --page: #f9f9f7; --surface: #fcfcfb;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7; --ring: rgba(11,11,11,0.10);
    --s1: #2a78d6; --s2: #1baf7a; --s3: #eda100;
    --good: #0ca30c; --warning: #fab219; --serious: #ec835a; --critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d; --surface: #1a1a19;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --baseline: #383835; --ring: rgba(255,255,255,0.10);
      --s1: #3987e5; --s2: #199e70; --s3: #c98500;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 20px; max-width: 1060px; margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  h1 { font-size: 19px; font-weight: 650; }
  .sub { color: var(--muted); font-size: 12.5px; }
  .chip {
    font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 999px;
    border: 1px solid var(--ring); display: inline-flex; align-items: center; gap: 5px;
  }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .tile {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 10px;
    padding: 12px 14px 10px;
  }
  .tile .label { font-size: 11.5px; color: var(--ink-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .tile .value { font-size: 26px; font-weight: 650; margin-top: 2px; }
  .tile .value small { font-size: 14px; font-weight: 500; color: var(--ink-2); }
  .tile .foot { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .controls { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; }
  .controls .lbl { font-size: 12.5px; color: var(--ink-2); margin-right: 4px; }
  .rangebtn {
    font: 600 12.5px system-ui, sans-serif; color: var(--ink-2);
    background: transparent; border: 1px solid var(--ring); border-radius: 7px;
    padding: 4px 12px; cursor: pointer;
  }
  .rangebtn:hover { background: var(--surface); }
  .rangebtn.on { background: var(--surface); color: var(--ink); border-color: var(--baseline); }
  .card {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 10px;
    padding: 14px 16px 8px; margin-bottom: 14px; position: relative;
  }
  .card h2 { font-size: 13.5px; font-weight: 650; }
  .legend { display: flex; gap: 14px; margin: 4px 0 2px; }
  .legend span { font-size: 12px; color: var(--ink-2); display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  svg { display: block; width: 100%; }
  svg text { font: 11px system-ui, sans-serif; fill: var(--muted); }
  .tooltip {
    position: absolute; pointer-events: none; display: none; z-index: 5;
    background: var(--surface); border: 1px solid var(--ring); border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,.14); padding: 7px 10px; font-size: 12px;
    min-width: 130px;
  }
  .tooltip .t { color: var(--muted); margin-bottom: 3px; }
  .tooltip .row { display: flex; justify-content: space-between; gap: 14px; }
  .tooltip .row b { font-variant-numeric: tabular-nums; font-weight: 600; }
  .tooltip i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 5px; }
  .empty { color: var(--muted); font-size: 13px; padding: 26px 0 30px; text-align: center; }
  footer { color: var(--muted); font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>macpulse</h1>
  <span class="chip" id="thermChip">…</span>
  <span class="sub" id="updated">loading…</span>
</header>

<div class="tiles" id="tiles"></div>

<div class="controls">
  <span class="lbl">History</span>
  <button class="rangebtn" data-h="1">1h</button>
  <button class="rangebtn on" data-h="6">6h</button>
  <button class="rangebtn" data-h="24">24h</button>
  <button class="rangebtn" data-h="168">7d</button>
</div>

<div class="card" id="cardTemp">
  <h2>Temperature °C</h2>
  <div class="legend">
    <span><i style="background:var(--s1)"></i>CPU (max)</span>
    <span><i style="background:var(--s2)"></i>Battery</span>
    <span><i style="background:var(--s3)"></i>SSD</span>
  </div>
  <div class="plot"></div><div class="tooltip"></div>
</div>

<div class="card" id="cardCpu">
  <h2>CPU usage %</h2>
  <div class="plot"></div><div class="tooltip"></div>
</div>

<div class="card" id="cardMem">
  <h2>Memory GB</h2>
  <div class="legend">
    <span><i style="background:var(--s1)"></i>Used</span>
    <span><i style="background:var(--s3)"></i>Swap</span>
  </div>
  <div class="plot"></div><div class="tooltip"></div>
</div>

<footer>Live sample every 20s while this page is open · history stored in ~/.macpulse/history.db</footer>

<script>
const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
let hours = 6;

const fmtT = ts => {
  const d = new Date(ts);
  return hours > 24
    ? d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
    : d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
};

function tempStatus(t) {
  if (t == null) return ['–', 'var(--muted)'];
  if (t >= 95) return ['critical', 'var(--critical)'];
  if (t >= 85) return ['high', 'var(--serious)'];
  if (t >= 70) return ['elevated', 'var(--warning)'];
  return ['normal', 'var(--good)'];
}

function tile(label, value, unit, foot) {
  return `<div class="tile"><div class="label">${label}</div>
    <div class="value">${value ?? '–'}<small>${unit}</small></div>
    <div class="foot">${foot || ''}</div></div>`;
}

function renderTiles(s) {
  const [tw] = tempStatus(s.cpu_temp_max);
  document.getElementById('tiles').innerHTML =
    tile('CPU temp', s.cpu_temp_max, '°C', `avg ${s.cpu_temp_avg ?? '–'}°C · ${tw}`) +
    tile('CPU usage', s.cpu_usage_pct, '%', `load ${s.load_1m ?? '–'}`) +
    tile('Memory', s.mem_used_gb, ` / ${s.mem_total_gb} GB`, `swap ${s.swap_used_gb ?? '–'} GB`) +
    tile('Battery', s.battery_pct, '%', `${s.battery_state ?? ''} · ${s.battery_temp ?? '–'}°C · health ${s.battery_health_pct ?? '–'}%`) +
    tile('SSD', s.ssd_temp, '°C', `disk ${s.disk_used_gb} / ${s.disk_total_gb} GB`) +
    tile('Top process', '', '', `${s.top_process ?? '–'} (${s.top_process_cpu ?? '–'}% CPU)`);
  const chip = document.getElementById('thermChip');
  const state = s.thermal_pressure || '–';
  const col = state === 'Nominal' ? 'var(--good)' : state === 'Fair' ? 'var(--warning)' : 'var(--critical)';
  chip.innerHTML = `<i style="width:8px;height:8px;border-radius:99px;background:${col};display:inline-block"></i> Thermal: ${state}`;
  document.getElementById('updated').textContent =
    'updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// ---- minimal SVG line chart with crosshair + tooltip ----
function lineChart(card, rows, series, opts = {}) {
  const plot = card.querySelector('.plot');
  const tip = card.querySelector('.tooltip');
  const data = rows.filter(r => series.some(s => r[s.key] != null));
  if (data.length < 2) { plot.innerHTML = '<div class="empty">not enough history yet - leave the dashboard open or run <code>macpulse watch</code></div>'; return; }

  const W = plot.clientWidth || 960, H = 190, m = {t: 10, r: 14, b: 24, l: 40};
  const iw = W - m.l - m.r, ih = H - m.t - m.b;
  const xs = data.map(r => new Date(r.ts).getTime());
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  let vals = [];
  series.forEach(s => data.forEach(r => { if (r[s.key] != null) vals.push(r[s.key]); }));
  let y0 = opts.min ?? Math.min(...vals), y1 = opts.max ?? Math.max(...vals);
  if (y1 - y0 < 1e-9) { y0 -= 1; y1 += 1; }
  const pad = (y1 - y0) * 0.12; y0 = Math.max(opts.floor ?? -Infinity, y0 - pad); y1 += pad;
  const X = t => m.l + (t - x0) / (x1 - x0) * iw;
  const Y = v => m.t + (1 - (v - y0) / (y1 - y0)) * ih;

  let g = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;
  const ticks = 4;
  for (let i = 0; i <= ticks; i++) {
    const v = y0 + (y1 - y0) * i / ticks, y = Y(v);
    g += `<line x1="${m.l}" x2="${W - m.r}" y1="${y}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${m.l - 7}" y="${y + 3.5}" text-anchor="end">${(y1 - y0) < 5 ? v.toFixed(1) : Math.round(v)}</text>`;
  }
  const nx = Math.min(6, data.length);
  for (let i = 0; i < nx; i++) {
    const t = x0 + (x1 - x0) * i / (nx - 1 || 1);
    g += `<text x="${X(t)}" y="${H - 7}" text-anchor="middle">${fmtT(t)}</text>`;
  }
  g += `<line x1="${m.l}" x2="${W - m.r}" y1="${Y(y0)}" y2="${Y(y0)}" stroke="var(--baseline)" stroke-width="1"/>`;

  series.forEach(s => {
    const pts = data.filter(r => r[s.key] != null)
      .map(r => `${X(new Date(r.ts).getTime()).toFixed(1)},${Y(r[s.key]).toFixed(1)}`);
    g += `<polyline points="${pts.join(' ')}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    if (series.length > 1) {  // direct label at line end (relief for light-mode contrast)
      const last = data.filter(r => r[s.key] != null).at(-1);
      g += `<text x="${W - m.r - 2}" y="${Y(last[s.key]) - 5}" text-anchor="end" style="fill:var(--ink-2);font-weight:600">${s.name} ${last[s.key]}</text>`;
    }
  });
  g += `<line class="xh" x1="0" x2="0" y1="${m.t}" y2="${H - m.b}" stroke="var(--baseline)" stroke-width="1" style="display:none"/>`;
  series.forEach((s, i) => {
    g += `<circle class="dot d${i}" r="4" fill="${s.color}" stroke="var(--surface)" stroke-width="2" style="display:none"/>`;
  });
  g += `</svg>`;
  plot.innerHTML = g;

  const svg = plot.querySelector('svg'), xh = svg.querySelector('.xh');
  svg.addEventListener('mousemove', e => {
    const box = svg.getBoundingClientRect();
    const mx = (e.clientX - box.left) * W / box.width;
    let best = 0, bd = Infinity;
    data.forEach((r, i) => {
      const d = Math.abs(X(new Date(r.ts).getTime()) - mx);
      if (d < bd) { bd = d; best = i; }
    });
    const r = data[best], px = X(new Date(r.ts).getTime());
    xh.setAttribute('x1', px); xh.setAttribute('x2', px); xh.style.display = '';
    let rowsHtml = '';
    series.forEach((s, i) => {
      const dot = svg.querySelector('.d' + i);
      if (r[s.key] != null) {
        dot.setAttribute('cx', px); dot.setAttribute('cy', Y(r[s.key])); dot.style.display = '';
        rowsHtml += `<div class="row"><span><i style="background:${s.color}"></i>${s.name}</span><b>${r[s.key]}${opts.unit || ''}</b></div>`;
      } else dot.style.display = 'none';
    });
    tip.innerHTML = `<div class="t">${fmtT(r.ts)}</div>` + rowsHtml;
    tip.style.display = 'block';
    const cardBox = card.getBoundingClientRect();
    let left = e.clientX - cardBox.left + 16;
    if (left + tip.offsetWidth > cardBox.width - 8) left = e.clientX - cardBox.left - tip.offsetWidth - 16;
    tip.style.left = left + 'px';
    tip.style.top = (e.clientY - cardBox.top - 10) + 'px';
  });
  svg.addEventListener('mouseleave', () => {
    xh.style.display = 'none'; tip.style.display = 'none';
    svg.querySelectorAll('.dot').forEach(d => d.style.display = 'none');
  });
}

async function refreshCharts() {
  const rows = await (await fetch('/api/history?hours=' + hours)).json();
  lineChart(document.getElementById('cardTemp'), rows, [
    {key: 'cpu_temp_max', name: 'CPU', color: css('--s1')},
    {key: 'battery_temp', name: 'Battery', color: css('--s2')},
    {key: 'ssd_temp', name: 'SSD', color: css('--s3')},
  ], {unit: '°C'});
  lineChart(document.getElementById('cardCpu'), rows, [
    {key: 'cpu_usage_pct', name: 'CPU', color: css('--s1')},
  ], {unit: '%', min: 0, floor: 0});
  lineChart(document.getElementById('cardMem'), rows, [
    {key: 'mem_used_gb', name: 'Used', color: css('--s1')},
    {key: 'swap_used_gb', name: 'Swap', color: css('--s3')},
  ], {unit: ' GB', floor: 0});
}

async function refreshCurrent() {
  try {
    renderTiles(await (await fetch('/api/current')).json());
    refreshCharts();
  } catch (e) { document.getElementById('updated').textContent = 'server stopped'; }
}

document.querySelectorAll('.rangebtn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.rangebtn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  hours = +b.dataset.h;
  refreshCharts();
}));
window.addEventListener('resize', () => refreshCharts());

refreshCurrent();
setInterval(refreshCurrent, 20000);
</script>
</body>
</html>
